<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graph - codebase-pilot</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-8px); }
    to { opacity: 1; transform: translateX(0); }
  }

  @keyframes barGrow {
    from { width: 0; }
  }

  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    display: flex;
    min-height: 100vh;
  }

  a { color: #58a6ff; text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Sidebar */
  .sidebar {
    width: 220px;
    min-height: 100vh;
    background: #161b22;
    border-right: 1px solid #30363d;
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    z-index: 50;
  }

  .sidebar-brand {
    padding: 20px 16px;
    border-bottom: 1px solid #30363d;
    font-size: 15px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, #58a6ff, #3fb950);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .sidebar-brand .plane { font-size: 18px; -webkit-text-fill-color: initial; }

  .sidebar nav {
    flex: 1;
    padding: 12px 8px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .sidebar nav a {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-radius: 6px;
    color: #8b949e;
    font-size: 14px;
    transition: background 0.15s, color 0.15s;
    text-decoration: none;
  }

  .sidebar nav a:hover {
    background: #1c2129;
    color: #e6edf3;
    text-decoration: none;
  }

  .sidebar nav a.active {
    background: rgba(88, 166, 255, 0.1);
    color: #58a6ff;
    font-weight: 500;
    border-left: 3px solid #58a6ff;
    padding-left: 9px;
  }

  .sidebar nav .nav-icon {
    width: 20px;
    text-align: center;
    font-size: 14px;
  }

  .sidebar-footer {
    padding: 12px 16px;
    border-top: 1px solid #30363d;
    font-size: 11px;
    color: #8b949e;
  }

  /* Main content */
  .main {
    flex: 1;
    margin-left: 220px;
    padding: 28px 36px;
    min-height: 100vh;
    animation: fadeIn 0.3s ease both;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .sidebar { width: 60px; }
    .sidebar nav a span:not(.nav-icon) { display: none; }
    .sidebar-brand span:not(.plane) { display: none; }
    .sidebar-footer { display: none; }
    .main { margin-left: 60px; padding: 20px 16px; }
    .cards { grid-template-columns: 1fr 1fr; }
  }

  .page-title {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 24px;
    letter-spacing: -0.01em;
    color: #e6edf3;
    animation: fadeIn 0.3s ease both;
  }

  /* Cards */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }

  .card {
    background: rgba(22, 27, 34, 0.8);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(48, 54, 61, 0.5);
    border-radius: 12px;
    padding: 20px;
    transition: all 0.2s ease;
    animation: fadeIn 0.4s ease both;
  }

  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.1s; }
  .card:nth-child(3) { animation-delay: 0.15s; }
  .card:nth-child(4) { animation-delay: 0.2s; }

  .card:hover {
    transform: translateY(-2px);
    border-color: rgba(88, 166, 255, 0.3);
    box-shadow: 0 4px 24px rgba(88, 166, 255, 0.08);
  }

  .card-label {
    font-size: 12px;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .card-value {
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #e6edf3;
    font-family: ui-monospace, 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
  }

  .card-sub {
    font-size: 12px;
    color: #8b949e;
    margin-top: 4px;
  }

  /* Tables */
  .table-wrap {
    background: rgba(22, 27, 34, 0.8);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(48, 54, 61, 0.5);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 24px;
    animation: fadeIn 0.5s ease both;
    animation-delay: 0.2s;
  }

  .table-wrap h3 {
    padding: 14px 20px;
    font-size: 14px;
    font-weight: 600;
    border-bottom: 1px solid #30363d;
    color: #e6edf3;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    text-align: left;
    padding: 10px 16px;
    font-size: 12px;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    border-bottom: 1px solid #30363d;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }

  thead th:hover { color: #e6edf3; }

  tbody td {
    padding: 10px 16px;
    font-size: 13px;
    border-bottom: 1px solid #30363d;
  }

  tbody tr:last-child td { border-bottom: none; }

  tbody tr:hover { background: #1c2129; }

  .mono { font-family: ui-monospace, 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; font-size: 12px; }

  /* Bar */
  .bar-bg {
    height: 6px;
    background: #30363d;
    border-radius: 3px;
    overflow: hidden;
    min-width: 80px;
  }

  .bar-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, #58a6ff, #3fb950);
    animation: barGrow 0.8s ease both;
  }

  /* Badge */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 500;
  }

  .badge-blue { background: rgba(88,166,255,0.15); color: #58a6ff; }
  .badge-green { background: rgba(63,185,80,0.15); color: #3fb950; }
  .badge-yellow { background: rgba(210,153,34,0.15); color: #d29922; }
  .badge-red { background: rgba(248,81,73,0.15); color: #f85149; }

  /* Savings chart */
  .savings-chart {
    display: flex;
    gap: 24px;
    margin-bottom: 28px;
  }

  .savings-bar {
    flex: 1;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 16px 20px;
  }

  .savings-bar-label {
    font-size: 12px;
    color: #8b949e;
    margin-bottom: 8px;
  }

  .savings-bar-track {
    height: 24px;
    background: #30363d;
    border-radius: 4px;
    overflow: hidden;
    display: flex;
  }

  .savings-bar-used {
    height: 100%;
    background: #58a6ff;
  }

  .savings-bar-saved {
    height: 100%;
    background: #3fb950;
  }

  .savings-bar-legend {
    display: flex;
    gap: 16px;
    margin-top: 8px;
    font-size: 11px;
    color: #8b949e;
  }

  .savings-bar-legend span::before {
    content: '';
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    margin-right: 4px;
    vertical-align: middle;
  }

  .legend-used::before { background: #58a6ff !important; }
  .legend-saved::before { background: #3fb950 !important; }

  /* Section */
  .section {
    margin-bottom: 28px;
  }

  .section-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 12px;
    color: #e6edf3;
  }

  /* Search */
  .search-box {
    width: 100%;
    max-width: 600px;
    padding: 12px 16px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    color: #e6edf3;
    font-size: 15px;
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 20px;
  }

  .search-box:focus { border-color: #58a6ff; }
  .search-box::placeholder { color: #8b949e; }

  .search-result {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 8px;
    transition: border-color 0.2s;
  }

  .search-result:hover { border-color: #58a6ff; }

  .search-result-path {
    font-family: ui-monospace, 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
    font-size: 13px;
    color: #58a6ff;
    margin-bottom: 4px;
  }

  .search-result-snippet {
    font-family: ui-monospace, 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
    font-size: 12px;
    color: #8b949e;
    white-space: pre-wrap;
    word-break: break-all;
  }

  .search-result-snippet mark {
    background: rgba(210, 153, 34, 0.3);
    color: #d29922;
    border-radius: 2px;
    padding: 0 2px;
  }

  .search-result-meta {
    font-size: 11px;
    color: #8b949e;
    margin-top: 4px;
    display: flex;
    gap: 16px;
  }

  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: #8b949e;
    font-size: 14px;
  }

  /* Agents */
  .agent-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 12px;
  }

  .agent-card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }

  .agent-card-name {
    font-size: 15px;
    font-weight: 600;
    color: #e6edf3;
  }

  .agent-card-task {
    font-size: 13px;
    color: #8b949e;
    margin-bottom: 10px;
  }

  .agent-card-details {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    font-size: 12px;
  }

  .agent-context {
    font-family: ui-monospace, 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
    font-size: 11px;
    background: rgba(88,166,255,0.08);
    padding: 2px 8px;
    border-radius: 4px;
    color: #58a6ff;
  }

  /* Layer diagram */
  .layer-diagram {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 24px;
    margin-bottom: 24px;
  }

  .layer-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .layer-label {
    width: 60px;
    font-size: 12px;
    color: #8b949e;
    text-align: right;
    flex-shrink: 0;
  }

  .layer-items {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .layer-item {
    padding: 4px 12px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 500;
  }

  /* Impact */
  .risk-meter {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .risk-meter-bar {
    flex: 1;
    max-width: 300px;
    height: 12px;
    background: #30363d;
    border-radius: 6px;
    overflow: hidden;
  }

  .risk-meter-fill {
    height: 100%;
    border-radius: 6px;
    transition: width 0.3s;
  }

  .info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .main { margin-left: 0; padding: 16px; }
    .cards { grid-template-columns: 1fr 1fr; }
    .savings-chart { flex-direction: column; }
  }
</style>

  var container = document.getElementById('graph-container');
  var searchBox = document.getElementById('graph-search');
  var width = container.clientWidth;
  var height = container.clientHeight;

  var svg = d3.select('#graph-container')
    .append('svg')
    .attr('width', width)
    .attr('height', height);

  var g = svg.append('g');

  svg.call(d3.zoom().on('zoom', function(e) { g.attr('transform', e.transform); }));

  var groupColors = {};
  var palette = ['#58a6ff', '#3fb950', '#d29922', '#f85149', '#bc8cff', '#f778ba', '#79c0ff', '#7ee787'];
  var ci = 0;
  data.nodes.forEach(function(n) {
    if (!groupColors[n.group]) groupColors[n.group] = palette[ci++ % palette.length];
  });

  var sim = d3.forceSimulation(data.nodes)
    .force('link', d3.forceLink(data.edges).id(function(d) { return d.id; }).distance(60))
    .force('charge', d3.forceManyBody().strength(-120))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide().radius(function(d) { return Math.sqrt(d.tokens / 50) + 8; }));

  var link = g.append('g')
    .selectAll('line')
    .data(data.edges)
    .join('line')
    .attr('stroke', '#30363d')
    .attr('stroke-width', 1)
    .attr('stroke-opacity', 0.6);

  var node = g.append('g')
    .selectAll('circle')
    .data(data.nodes)
    .join('circle')
    .attr('r', function(d) { return Math.max(4, Math.sqrt(d.tokens / 50) + 3); })
    .attr('fill', function(d) { return groupColors[d.group] || '#58a6ff'; })
    .attr('stroke', '#0d1117')
    .attr('stroke-width', 1.5)
    .style('cursor', 'pointer')
    .call(d3.drag()
      .on('start', function(e, d) { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag', function(e, d) { d.fx = e.x; d.fy = e.y; })
      .on('end', function(e, d) { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; })
    );

  var tooltipEl = document.getElementById('graph-tooltip');

  node.on('mouseover', function(e, d) {
    tooltipEl.style.display = 'block';
    tooltipEl.textContent = '';
    var b = document.createElement('strong');
    b.textContent = d.id;
    tooltipEl.appendChild(b);
    tooltipEl.appendChild(document.createElement('br'));
    tooltipEl.appendChild(document.createTextNode(d.tokens + ' tokens'));
    tooltipEl.appendChild(document.createElement('br'));
    tooltipEl.appendChild(document.createTextNode('group: ' + d.group));
    d3.select(e.target).attr('stroke', '#58a6ff').attr('stroke-width', 2.5);
  }).on('mousemove', function(e) {
    tooltipEl.style.left = (e.pageX + 12) + 'px';
    tooltipEl.style.top = (e.pageY - 12) + 'px';
  }).on('mouseout', function(e) {
    tooltipEl.style.display = 'none';
    d3.select(e.target).attr('stroke', '#0d1117').attr('stroke-width', 1.5);
  }).on('click', function(e, d) {
    window.location.href = '/impact?file=' + encodeURIComponent(d.id);
  });

  sim.on('tick', function() {
    link
      .attr('x1', function(d) { return d.source.x; }).attr('y1', function(d) { return d.source.y; })
      .attr('x2', function(d) { return d.target.x; }).attr('y2', function(d) { return d.target.y; });
    node.attr('cx', function(d) { return d.x; }).attr('cy', function(d) { return d.y; });
  });

  searchBox.addEventListener('input', function() {
    var q = searchBox.value.toLowerCase();
    node.attr('opacity', function(d) { return !q || d.id.toLowerCase().indexOf(q) !== -1 ? 1 : 0.1; });
    link.attr('opacity', function(d) {
      if (!q) return 0.6;
      var s = (typeof d.source === 'object' ? d.source.id : d.source).toLowerCase();
      var t = (typeof d.target === 'object' ? d.target.id : d.target).toLowerCase();
      return s.indexOf(q) !== -1 || t.indexOf(q) !== -1 ? 0.6 : 0.05;
    });
  });

  document.getElementById('graph-stats').textContent = data.nodes.length + ' nodes, ' + data.edges.length + ' edges';
})();
